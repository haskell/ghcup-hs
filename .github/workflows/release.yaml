name: Build and release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CABAL_CACHE_DISABLE: ${{ vars.CABAL_CACHE_DISABLE }}
  CABAL_CACHE_NONFATAL: yes
  JSON_VERSION: "0.1.0"
  GHC_VER: 9.6.7
  CABAL_VER: 3.14.2.0
  GHCUP_VER: 0.2.0.0
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  S3_HOST: ${{ secrets.S3_HOST }}
  GHCUP_MSYS2_ENV: CLANG64
  MSYSTEM: CLANG64
  CHERE_INVOKING: 1
  # overwritten for windows
  CABAL_DIR: ${{ github.workspace }}/cabal
  GHCUP_INSTALL_BASE_PREFIX: ${{ github.workspace }}

jobs:
  build-linux:
    name: Build linux binary
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            ARTIFACT: "i386-linux-ghcup"
            GHC_VER: 8.10.7
            ARCH: 32
          - os: ubuntu-latest
            ARTIFACT: "x86_64-linux-ghcup"
            ARCH: 64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - if: matrix.ARCH == '32'
        name: Run build (32 bit linux)
        uses: docker://hasufell/i386-alpine-haskell:3.21
        with: &build-linux
          args: ghcup run -i --ghc ${{ env.GHC_VER }} --cabal ${{ env.CABAL_VER }} -- bash .github/scripts/build.sh --verbose --os ${{ runner.os }} --check-linking --strip -- --enable-executable-static
        env:
          ARTIFACT: ${{ matrix.ARTIFACT }}
          ARCH: ${{ matrix.ARCH }}
          GHC_VER: ${{ matrix.GHC_VER }}
          DISTRO: Alpine
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          S3_HOST: ${{ env.S3_HOST }}

      - if: matrix.ARCH == '64'
        name: Run build (64 bit linux)
        uses: docker://hasufell/alpine-haskell:3.21
        with: *build-linux
        env:
          ARTIFACT: ${{ matrix.ARTIFACT }}
          ARCH: ${{ matrix.ARCH }}
          DISTRO: Alpine
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          S3_HOST: ${{ env.S3_HOST }}

      - if: always()
        name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.ARTIFACT }}
          path: |
            ./out/*


  build-arm:
    name: Build ARM binary
    runs-on: ubuntu-24.04-arm
    env:
      ARTIFACT: "aarch64-linux-ghcup"
      ARCH: ARM64
      DISTRO: Alpine
    steps:
      - name: git config
        run: |
          git config --global --get-all safe.directory | grep '^\*$' || git config --global --add safe.directory "*"
        shell: bash

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - uses: docker://hasufell/arm64v8-alpine-haskell:3.21
        name: Run build (aarch64 linux)
        with:
          args: ghcup run -i --ghc ${{ env.GHC_VER }} --cabal ${{ env.CABAL_VER }} -- bash .github/scripts/build.sh --verbose --os ${{ runner.os }} --check-linking --strip -- --ghc-options=-split-sections --enable-executable-static

      - if: always()
        name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ env.ARTIFACT }}
          path: |
            ./out/*

  build-mac:
    name: Build binary (Mac)
    runs-on: ${{ matrix.os }}
    env:
      MACOSX_DEPLOYMENT_TARGET: 10.13
      LLVM_VER: 16
      DISTRO: na
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macOS-latest
            ARTIFACT: "aarch64-apple-darwin-ghcup"
            ARCH: ARM64
          - os: macOS-15-intel
            ARTIFACT: "x86_64-apple-darwin-ghcup"
            ARCH: 64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Install GHCup
        uses: haskell/ghcup-setup@v1

      - name: Run build (mac aarch64)
        run: |
          brew install git coreutils autoconf automake
          ghcup run -i --ghc ${{ env.GHC_VER }} --cabal ${{ env.CABAL_VER }} -- bash .github/scripts/build.sh --verbose --os ${{ runner.os }} --check-linking --strip
        env:
          ARTIFACT: ${{ matrix.ARTIFACT }}
          ARCH: ${{ matrix.ARCH }}

      - if: always()
        name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.ARTIFACT }}
          path: |
            ./out/*

  build-win:
    name: Build binary (Windows)
    runs-on: windows-latest
    env:
      ARTIFACT: "x86_64-mingw64-ghcup"
      ARCH: 64
      DISTRO: na
      GHCUP_INSTALL_BASE_PREFIX: "C:\\"
    defaults:
      run:
        shell: 'C:/msys64/usr/bin/bash.exe --login -e {0}'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Install GHCup
        uses: haskell/ghcup-setup@v1
        env:
          GHCUP_MSYS2: 'C:/msys64'

      - name: Install msys2 dependencies
        run: &msys2-install |
          pacman --noconfirm -S --needed --overwrite '*' bash winpty git tar bsdtar unzip binutils autoconf make xz curl libtool automake p7zip patch ca-certificates python3 zip mingw-w64-clang-x86_64-toolchain mingw-w64-clang-x86_64-tools-git gzip mingw-w64-clang-x86_64-pkgconf mingw-w64-clang-x86_64-zlib

      - name: Run build (windows)
        run: |
          rm -f /c/Strawberry/perl/bin/pkg-config
          rm /clang64/bin/zlib1.dll
          export PATH="/c/ghcup/bin:$PATH"
          # don't use bash, because it points to WSL2
          ghcup install ghc --set ${{ env.GHC_VER }}
          ghcup install cabal --set ${{ env.CABAL_VER }}
          bash .github/scripts/build.sh --ghc ghc-${{ env.GHC_VER }} --verbose --os ${{ runner.os }} --check-linking --strip
        env:
          CABAL_DIR: "C:\\Users\\runneradmin\\AppData\\Roaming\\cabal"

      - if: always()
        name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ env.ARTIFACT }}
          path: |
            ./out/*

  build-freebsd:
    name: Build binary (FreeBSD)
    runs-on: [self-hosted, FreeBSD, X64]
    env:
      ARTIFACT: "x86_64-portbld-freebsd-ghcup"
      ARCH: 64
      DISTRO: na
      RUNNER_OS: FreeBSD
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Install prerequisites
        run: |
          sudo sed -i.bak -e 's/quarterly/latest/' /etc/pkg/FreeBSD.conf
          sudo pkg install -y ghc hs-cabal-install git bash misc/compat10x misc/compat11x misc/compat12x llvm14 libiconv curl gcc gmp gmake ncurses perl5 pkgconf libffi
          sudo tzsetup Etc/GMT
          sudo adjkerntz -a

      - name: Install GHCup
        uses: haskell/ghcup-setup@v1

      - name: Run build
        run: |
          ghcup run -i --ghc ${{ env.GHC_VER }} --cabal ${{ env.CABAL_VER }} -- bash .github/scripts/build.sh --verbose --os ${{ env.RUNNER_OS }} --check-linking --strip

      - if: always()
        name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ env.ARTIFACT }}
          path: |
            ./out/*

  build-openbsd:
    name: Build binary (OpenBSD)
    runs-on: [self-hosted, openbsd, X64]
    env:
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      S3_HOST: ${{ secrets.S3_HOST }}
      ARTIFACT: "x86_64-openbsd-ghcup"
      ARCH: 64
      DISTRO: na
      RUNNER_OS: OpenBSD
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Install prerequisites
        run: |
          gcc_ver=$(pkg_info -Q gcc | grep '^gcc-[0-9]' | sort -u | head -1 | awk '{ print $1 }')
          doas pkg_add -I ghc cabal-install git bash libiconv curl ${gcc_ver} gmp gmake libffi

      - name: Run build
        run: |
          bash .github/scripts/build.sh --verbose --os ${{ env.RUNNER_OS }} --check-linking --strip

      - if: always()
        name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ env.ARTIFACT }}
          path: |
            ./out/*

  test-linux:
    name: Test linux
    needs: "build-linux"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            ARTIFACT: "i386-linux-ghcup"
            GHC_VER: 8.10.7
            ARCH: 32
            DISTRO: Alpine
          - os: ubuntu-latest
            ARTIFACT: "x86_64-linux-ghcup"
            ARCH: 64
            DISTRO: Alpine
          - os: ubuntu-latest
            ARTIFACT: "x86_64-linux-ghcup"
            ARCH: 64
            DISTRO: Ubuntu

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          merge-multiple: true
          path: ./out

      - if: matrix.ARCH == '32' && matrix.DISTRO == 'Alpine'
        name: Run test (32 bit linux Alpine)
        uses: docker://hasufell/i386-alpine-haskell:3.21
        with: &with-test-linux
          args: bash .github/scripts/test.sh --verbose --ghcup-binary out/${{ env.ARTIFACT }}-${{ env.GHCUP_VER }} --test-binary out/test-${{ env.ARTIFACT }}-${{ env.GHCUP_VER }} --test-optparse-binary out/test-optparse-${{ env.ARTIFACT }}-${{ env.GHCUP_VER }} --os ${{ runner.os }} --arch ${{ env.ARCH }} --distro ${{ env.DISTRO }} --ghcup-dir ${{ github.workspace }} --ghc-version ${{ env.GHC_VER }} --cabal-version ${{ env.CABAL_VER }} --json-version ${{ env.JSON_VERSION }}
        env:
          ARTIFACT: ${{ matrix.ARTIFACT }}
          ARCH: ${{ matrix.ARCH }}
          GHC_VER: ${{ matrix.GHC_VER }}
          DISTRO: ${{ matrix.DISTRO }}

      - if: matrix.ARCH == '64' && matrix.DISTRO == 'Alpine'
        name: Run test (64 bit linux Alpine)
        uses: docker://hasufell/alpine-haskell:3.21
        with: *with-test-linux
        env:
          ARTIFACT: ${{ matrix.ARTIFACT }}
          ARCH: ${{ matrix.ARCH }}
          DISTRO: ${{ matrix.DISTRO }}

      - if: matrix.DISTRO != 'Alpine'
        name: Run test (64 bit linux)
        run: |
          sudo apt-get install -y libnuma-dev zlib1g-dev libgmp-dev libgmp10 libssl-dev liblzma-dev libbz2-dev git wget lsb-release software-properties-common gnupg2 apt-transport-https gcc autoconf automake build-essential curl gzip
          bash .github/scripts/test.sh --verbose --ghcup-binary out/${{ env.ARTIFACT }}-${{ env.GHCUP_VER }} --test-binary out/test-${{ env.ARTIFACT }}-${{ env.GHCUP_VER }} --test-optparse-binary out/test-optparse-${{ env.ARTIFACT }}-${{ env.GHCUP_VER }} --os ${{ runner.os }} --arch ${{ env.ARCH }} --distro ${{ env.DISTRO }} --ghcup-dir ${{ github.workspace }} --ghc-version ${{ env.GHC_VER }} --cabal-version ${{ env.CABAL_VER }} --json-version ${{ env.JSON_VERSION }}
        env:
          ARTIFACT: ${{ matrix.ARTIFACT }}
          ARCH: ${{ matrix.ARCH }}
          DISTRO: ${{ matrix.DISTRO }}

      - if: failure()
        name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: testfiles-${{ matrix.ARTIFACT }}
          path: |
            ./test/ghcup-test/golden/unix/GHCupInfo*json

  test-arm:
    name: Test ARM
    needs: "build-arm"
    runs-on: ubuntu-24.04-arm
    env:
      ARTIFACT: "aarch64-linux-ghcup"
      ARCH: ARM64
      DISTRO: Alpine
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          merge-multiple: true
          path: ./out

      - uses: docker://hasufell/arm64v8-alpine-haskell:3.21
        name: Run test (aarch64 alpine)
        with: *with-test-linux

      - if: failure()
        name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: testfiles-${{ env.ARTIFACT }}
          path: |
            ./test/ghcup-test/golden/unix/GHCupInfo*json

  test-mac:
    name: Test Mac
    needs: "build-mac"
    runs-on: ${{ matrix.os }}
    env:
      MACOSX_DEPLOYMENT_TARGET: 10.13
      DISTRO: na
    strategy:
      matrix:
        include:
          - os: macOS-latest
            ARTIFACT: "aarch64-apple-darwin-ghcup"
            ARCH: ARM64
          - os: macOS-15-intel
            ARTIFACT: "x86_64-apple-darwin-ghcup"
            ARCH: 64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Install GHCup
        uses: haskell/ghcup-setup@v1

      - uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          merge-multiple: true
          path: ./out

      - name: Run test (mac)
        run: |
          brew install coreutils
          bash .github/scripts/test.sh --verbose --ghcup-binary out/${{ env.ARTIFACT }}-${{ env.GHCUP_VER }} --test-binary out/test-${{ env.ARTIFACT }}-${{ env.GHCUP_VER }} --test-optparse-binary out/test-optparse-${{ env.ARTIFACT }}-${{ env.GHCUP_VER }} --os ${{ runner.os }} --arch ${{ env.ARCH }} --distro ${{ env.DISTRO }} --ghcup-dir ${{ github.workspace }} --ghc-version ${{ env.GHC_VER }} --cabal-version ${{ env.CABAL_VER }} --json-version ${{ env.JSON_VERSION }} --project-dir ${{ github.workspace }}
        env:
          ARTIFACT: ${{ matrix.ARTIFACT }}
          ARCH: ${{ matrix.ARCH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: testfiles-${{ matrix.ARTIFACT }}
          path: |
            ./test/ghcup-test/golden/unix/GHCupInfo*json

  test-win:
    name: Test Win
    needs: "build-win"
    runs-on: windows-latest
    env:
      ARTIFACT: "x86_64-mingw64-ghcup"
      ARCH: 64
      DISTRO: na
      GHCUP_INSTALL_BASE_PREFIX: "C:\\"
    defaults:
      run:
        shell: 'C:/msys64/usr/bin/bash.exe --login -e {0}'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Install GHCup
        uses: haskell/ghcup-setup@v1
        env:
          GHCUP_MSYS2: 'C:/msys64'

      - name: Install msys2 dependencies
        run: *msys2-install

      - uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          merge-multiple: true
          path: ./out

      - name: Run test (windows)
        run: |
          rm -f /c/Strawberry/perl/bin/pkg-config
          rm /clang64/bin/zlib1.dll
          bash .github/scripts/test.sh --verbose --ghcup-binary out/${{ env.ARTIFACT }}-${{ env.GHCUP_VER }} --test-binary out/test-${{ env.ARTIFACT }}-${{ env.GHCUP_VER }} --test-optparse-binary out/test-optparse-${{ env.ARTIFACT }}-${{ env.GHCUP_VER }} --os ${{ runner.os }} --arch ${{ env.ARCH }} --distro ${{ env.DISTRO }} --ghcup-dir /c --ghc-version ${{ env.GHC_VER }} --cabal-version ${{ env.CABAL_VER }} --json-version ${{ env.JSON_VERSION }} --project-dir '${{ github.workspace }}'
        env:
          CABAL_DIR: "C:\\Users\\runneradmin\\AppData\\Roaming\\cabal"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: testfiles-${{ env.ARTIFACT }}
          path: |
            ./test/ghcup-test/golden/windows/GHCupInfo*json

  test-freebsd:
    name: Test FreeBSD
    needs: "build-freebsd"
    runs-on: [self-hosted, FreeBSD, X64]
    env:
      ARTIFACT: "x86_64-portbld-freebsd-ghcup"
      ARCH: 64
      DISTRO: na
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Install prerequisites
        run: |
          sudo sed -i.bak -e 's/quarterly/latest/' /etc/pkg/FreeBSD.conf
          sudo pkg install -y ghc hs-cabal-install git bash misc/compat10x misc/compat11x misc/compat12x llvm14 libiconv curl gcc gmp gmake ncurses perl5 pkgconf libffi
          sudo tzsetup Etc/GMT
          sudo adjkerntz -a

      - uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          merge-multiple: true
          path: ./out

      - name: Run test
        run: &freebsd-run-test |
          bash .github/scripts/test.sh --verbose --ghcup-binary out/${{ env.ARTIFACT }}-${{ env.GHCUP_VER }} --test-binary out/test-${{ env.ARTIFACT }}-${{ env.GHCUP_VER }} --test-optparse-binary out/test-optparse-${{ env.ARTIFACT }}-${{ env.GHCUP_VER }} --os ${{ env.OS }} --arch ${{ env.ARCH }} --distro ${{ env.DISTRO }} --ghcup-dir ${{ github.workspace }} --ghc-version ${{ env.GHC_VER }} --cabal-version ${{ env.CABAL_VER }} --json-version ${{ env.JSON_VERSION }} --project-dir ${{ github.workspace }}
        env:
          OS: "FreeBSD"

      - if: failure()
        name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: testfiles-${{ env.ARTIFACT }}
          path: |
            ./test/ghcup-test/golden/unix/GHCupInfo*json

  test-openbsd:
    name: Test OpenBSD
    needs: "build-openbsd"
    runs-on: [self-hosted, openbsd, X64]
    env:
      ARTIFACT: "x86_64-openbsd-ghcup"
      ARCH: 64
      DISTRO: na
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Install prerequisites
        run: |
          gcc_ver=$(pkg_info -Q gcc | grep '^gcc-[0-9]' | sort -u | head -1 | awk '{ print $1 }')
          doas pkg_add -I ghc cabal-install git bash libiconv curl ${gcc_ver} gmp gmake libffi

      - uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          merge-multiple: true
          path: ./out

      - name: Run test
        run: *freebsd-run-test
        env:
          OS: "OpenBSD"

      - if: failure()
        name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: testfiles-${{ env.ARTIFACT }}
          path: |
            ./test/ghcup-test/golden/unix/GHCupInfo*json

  hls:
    name: hls
    needs: build-linux
    runs-on: ubuntu-latest
    env:
      GHC_VERSION: "8.10.7"
      HLS_TARGET_VERSION: "1.8.0.0"
      CABAL_VERSION: "3.8.1.0"
      ARTIFACT: "x86_64-linux-ghcup"
      DISTRO: Ubuntu
      ARCH: 64
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      S3_HOST: ${{ secrets.S3_HOST }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          merge-multiple: true
          path: ./out

      - name: Run hls build
        run: |
          sudo apt-get install -y libnuma-dev zlib1g-dev libgmp-dev libgmp10 libssl-dev liblzma-dev libbz2-dev git wget lsb-release software-properties-common gnupg2 apt-transport-https gcc autoconf automake build-essential curl gzip
          sh .github/scripts/hls.sh
        env:
          PROJECT_DIR: ${{ github.workspace }}
          OS: ${{ runner.os }}

  release:
    name: release
    needs: ["test-linux", "test-arm", "test-mac", "test-win", "test-freebsd", "test-openbsd", "hls"]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          merge-multiple: true
          path: ./out

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: |
            ./out/*
